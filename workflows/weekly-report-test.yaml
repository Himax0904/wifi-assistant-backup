name: weekly-report-test
trigger:
  type: manual

pipeline:
  - step: retrieve_docs
    skill: local-rag
    params:
      query: "本周项目任务完成情况"
      top_k: 5
    safety_level: green

  - step: extract_data
    skill: workflow-automation
    params:
      action: parse_markdown_table
      source: previous_step.output
    safety_level: green

  - step: generate_charts
    skill: data-visualization
    params:
      charts:
        - type: pie
          title: "任务状态分布"
          data_field: status
        - type: bar
          title: "工时统计"
          x_field: task
          y_field: hours
      output_format: png
    safety_level: green

  - step: send_report
    skill: workflow-automation
    params:
      action: send_feishu_message
      content: "周报已生成，请查看"
      attachments: previous_step.charts
    safety_level: green
